<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor Word | Humanitasforoms.org</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
</head>
<body>
  <main class="module-page">
    <section class="section module-detail">
      <a class="back-link" id="backToModule" href="index.html#modulos">Volver al modulo</a>
      <div class="word-viewer">
        <div class="word-viewer__header">
          <p class="section__eyebrow">Documento Word</p>
          <h1 id="documentTitle">Cargando documento</h1>
        </div>
        <div class="word-viewer__status" id="documentStatus">Preparando vista...</div>
        <article class="word-viewer__content" id="documentContent"></article>
      </div>
    </section>
  </main>

  <script src="js/visor-word.js"></script>
</body>
